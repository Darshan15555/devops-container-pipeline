name: DevOps CI Pipeline

on:
 push:
   branches: [ main ]

jobs:

 test:
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v4

     - name: Setup Python
       uses: actions/setup-python@v4
       with:
         python-version: "3.11"

     - name: Install dependencies
       run: pip install -r requirements.txt

     - name: Run tests
       run: pytest

  docker-build:
   needs: test
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v4

     - name: Build Docker image
       run: docker build -t darshan15555/calculator-app .

     - name: Login to Docker Hub
       run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DARSHAN15555 }}" --password-stdin

     - name: Push Docker image
       run: docker push darshan15555/calculator-app
